[workspace]
name = "scallion-calibration"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64"]

[dependencies]
python = ">=3.11,<3.12"

# Core scientific stack
numpy = ">=1.21.0"
pandas = ">=1.3.0"
scipy = ">=1.7.0"

# Machine learning
scikit-learn = ">=1.0.0"
xgboost = ">=1.6.0"
lightgbm = ">=3.3.0"
optuna = ">=3.0.0"
joblib = ">=1.1.0"

# Visualization
matplotlib = ">=3.4.0"
seaborn = ">=0.11.0"